<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5e2129">
    <title>Offline - Pokédex</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f6efe6;
        color: #17211a;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, 100%);
        border: 1px solid #c9dfcc;
        border-radius: 8px;
        padding: 28px;
        background: #ffffff;
        box-shadow: 0 12px 28px rgba(94, 33, 41, 0.16);
        text-align: center;
      }

      .mark {
        display: grid;
        place-items: center;
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: #5e2129;
        color: #ffffff;
        font-size: 30px;
        font-weight: 900;
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 18px;
        color: #657269;
        line-height: 1.5;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 12px 16px;
        background: #5e2129;
        color: #ffffff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">P</div>
      <h1>Je bent offline</h1>
      <p>De Pokédex kan nu geen nieuwe gegevens ophalen. Probeer het opnieuw zodra je verbinding terug is.</p>
      <button type="button" onclick="location.reload()">Opnieuw proberen</button>
    </main>
  </body>
</html>
